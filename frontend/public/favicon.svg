<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Brand gradient matching the app theme (indigo → violet) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Package / box icon -->
  <!-- Top lid -->
  <path d="M16 22 L32 14 L48 22 L32 30 Z" fill="url(#lid)" opacity="0.95"/>
  <!-- Left face -->
  <path d="M16 22 L32 30 L32 48 L16 40 Z" fill="#312e81" opacity="0.6"/>
  <!-- Right face -->
  <path d="M48 22 L32 30 L32 48 L48 40 Z" fill="#1e1b4b" opacity="0.8"/>

  <!-- Highlight stripe (tape across the box) -->
  <path d="M16 22 L32 30 L48 22" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.9"/>

  <!-- Subtle "Y" mark (Youthnic) on the front -->
  <text x="32" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif"
        font-weight="900" font-size="9" fill="#fff" opacity="0.85">Y</text>
</svg>
